<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>After You - Assessment Categories</title>
    <link rel="icon" type="image/png" href="logo.png">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@700&family=Anuphan:wght@600;700&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #ffffff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
        }

        /* 🐏 โลโก้แบรนด์ด้านบนสุด */
        .logo-container {
            margin-bottom: 40px;
            text-align: center;
        }

        .logo-img {
            width: 110px;
            height: auto;
        }

        /* 🥞 จัดวางรูปสี่เหลี่ยมจัตุรัสด้วย Grid */
        .portal-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr); /* แถวละ 2 รูป */
            gap: 30px;
            max-width: 900px;
            width: 100%;
            margin-bottom: 30px;
        }

        /* 🔳 สไตล์รูปสี่เหลี่ยมจัตุรัส (Square Tiles) */
        .thumb-card {
            aspect-ratio: 1 / 1;
            border-radius: 12px;
            overflow: hidden;
            position: relative;
            text-decoration: none;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.05);
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .thumb-card:hover {
            transform: scale(1.03);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
        }

        /* สไตล์พิเศษสำหรับรูปล่างสุดตัวที่ 5 ให้วางอยู่ตรงกลาง */
        .full-width-center {
            grid-column: span 2;
            justify-self: center;
            width: calc(50% - 15px); /* ขนาดเท่ากับรูปอื่นๆ เป๊ะๆ ค๊าา */
        }

        .thumb-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: brightness(0.80);
            transition: transform 0.4s ease;
        }

        .thumb-card:hover .thumb-img {
            transform: scale(1.05);
        }

        /* ✍️ ตัวหนังสือภาษาไทยบนรูปสี่เหลี่ยม */
        .thumb-overlay-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #ffffff;
            font-family: 'Anuphan', sans-serif;
            font-size: 32px;
            font-weight: 700;
            text-shadow: 0 2px 12px rgba(0, 0, 0, 0.6);
            text-align: center;
            width: 90%;
            line-height: 1.2;
        }

        /* รองรับหน้าจอมือถือให้เรียงเดี่ยวสวยๆ ค๊าา */
        @media (max-width: 600px) {
            .portal-grid {
                grid-template-columns: 1fr;
                gap: 20px;
            }
            .full-width-center {
                grid-column: span 1;
                width: 100%;
            }
            .thumb-overlay-text {
                font-size: 28px;
            }
        }
    </style>
</head>
<body>

    <div class="logo-container">
        <a href="index.html"><img src="Logo.jpg" alt="After You" class="logo-img"></a>
    </div>

    <div class="portal-grid">
        
        <a href="https://forms.gle/dKbdNWZxhUxDHt2p6" target="_blank" class="thumb-card">
            <img src="Beverage.jpg" alt="สอบ Beverage" class="thumb-img">
            <div class="thumb-overlay-text">สอบ<br>Beverage</div>
        </a>

        <a href="https://forms.gle/sX2U8G4Mf3xqzxsg8" target="_blank" class="thumb-card">
            <img src="Dessert.jpg" alt="สอบ Dessert" class="thumb-img">
            <div class="thumb-overlay-text">สอบ<br>Dessert</div>
        </a>

        <a href="https://forms.gle/g5zVrMzSWgCNaxPeA" target="_blank" class="thumb-card">
            <img src="Kakigori.jpg" alt="สอบ Kakigori" class="thumb-img">
            <div class="thumb-overlay-text">สอบ<br>Kakigori</div>
        </a>

        <a href="https://forms.gle/j8VrTeTPMmRrtdgs6" target="_blank" class="thumb-card">
            <img src="MOU2.jpg" alt="สอบ MOU" class="thumb-img">
            <div class="thumb-overlay-text">สอบ<br>MOU</div>
        </a>

        <a href="https://forms.gle/XZXUHvjTWqfCx4T88" target="_blank" class="thumb-card full-width-center">
            <img src="Cashier.jpg" alt="สอบ Cashier" class="thumb-img">
            <div class="thumb-overlay-text">สอบ<br>Cashier</div>
        </a>

    </div>

</body>
</html>
