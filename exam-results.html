<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>After You - Exam Results</title>
    <!-- 🐏 ไอคอนบนแท็บดึง Logo.jpg -->
    <link rel="icon" type="image/jpeg" href="Logo.jpg">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;700&family=Anuphan:wght@500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #ffffff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 60px 20px;
            font-family: 'Anuphan', 'Plus Jakarta Sans', sans-serif;
        }

        /* 🐏 โลโก้แบรนด์ด้านบนสุด */
        .logo-container {
            margin-bottom: 20px;
            text-align: center;
        }

        .logo-img {
            width: 100px;
            height: auto;
        }

        /* 📋 หัวข้อผลการสอบ */
        .page-title {
            font-size: 32px;
            font-weight: 700;
            color: #4a4a4a;
            letter-spacing: 1px;
            margin-bottom: 30px;
            text-align: center;
        }

        /* ➖ เส้นคั่นแนวนอนยาวคลีนๆ */
        .divider {
            width: 100%;
            max-width: 950px;
            height: 1.5px;
            background-color: #707070;
            margin-bottom: 60px;
        }

        /* 🥞 แผงจัดวาง Layout การ์ด 3 ใบ ปรับให้เท่ากันเป๊ะแบบสมดุล */
        .dropdown-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr); /* แบ่ง 3 ช่องเท่ากันเป๊ะค๊าา */
            gap: 30px;
            width: 100%;
            max-width: 950px;
        }

        /* 🔳 ก้อนเมนูโครงสร้างแบบการ์ดแนวตั้ง (Card Wrapper) */
        .dropdown-wrapper {
            position: relative;
            width: 100%;
        }

        /* 🔘 ปรับดีไซน์ปุ่มหลักให้เป็นการ์ดสี่เหลี่ยมผืนผ้า สูงเท่ากัน ลุคมินิมอลพรีเมียม */
        .main-btn {
            background-color: #f7f7f7;
            border: 1px solid #e0e0e0;
            color: #4a4a4a;
            padding: 40px 20px;
            font-size: 18px;
            font-weight: 700;
            border-radius: 16px;
            cursor: pointer;
            text-align: center;
            min-height: 160px; /* บังคับให้ความสูงเท่ากันทุกกล่องค๊าา */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 12px;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            user-select: none;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.02);
        }

        /* ใส่สัญลักษณ์สามเหลี่ยมเล็กๆ สำหรับอันที่มี dropdown */
        .has-arrow::after {
            content: ' ▼';
            font-size: 11px;
            color: #999999;
            margin-top: 5px;
        }

        .dropdown-wrapper:hover .main-btn {
            background-color: #eeeeee;
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.05);
        }

        /* 🏷️ แถบป้ายบอกข้อมูลเดือนล่าสุด (UX สิ่งนี้ดีย์ต่อใจ User มากค่ะ) */
        .latest-badge {
            font-size: 12px;
            font-weight: 600;
            color: #bfa15f; /* สีทองหม่นคาเฟ่ */
            background-color: #fdfaf2;
            padding: 4px 12px;
            border-radius: 20px;
            border: 1px solid #f0e6cc;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        /* 📜 กล่องรายการเดือนเมื่อกดขยาย */
        .dropdown-content {
            display: none;
            position: absolute;
            top: 105%;
            left: 0;
            background-color: #ffffff;
            min-width: 100%;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            border-radius: 12px;
            border: 1px solid #eeeeee;
            overflow: hidden;
            z-index: 100;
            opacity: 0;
            transform: translateY(-10px);
            transition: opacity 0.2s ease, transform 0.2s ease;
        }

        .dropdown-wrapper.active .dropdown-content {
            display: block;
            opacity: 1;
            transform: translateY(0);
        }

        /* 📍 รายการในดร็อปดาวน์ */
        .dropdown-content a {
            color: #555555;
            padding: 14px 20px;
            text-decoration: none;
            display: block;
            font-size: 15px;
            font-weight: 600;
            font-family: 'Plus Jakarta Sans', sans-serif;
            text-align: center;
            border-bottom: 1px solid #f5f5f5;
            transition: background-color 0.2s;
        }

        .dropdown-content a:last-child {
            border-bottom: none;
        }

        .dropdown-content a:hover {
            background-color: #f7f7f7;
            color: #bfa15f;
        }

        /* 🚨 หน้าต่าง Pop-up ดักสรุปกุ๊ก */
        .notice-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.6);
            z-index: 9999;
            justify-content: center;
            align-items: center;
            padding: 20px;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .notice-modal.active {
            display: flex;
            opacity: 1;
        }

        .notice-box {
            background-color: #ffffff;
            padding: 40px 30px;
            border-radius: 16px;
            max-width: 450px;
            width: 100%;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.2);
            position: relative;
            text-align: center;
            transform: scale(0.95);
            transition: transform 0.3s ease;
        }

        .notice-modal.active .notice-box {
            transform: scale(1);
        }

        .notice-text {
            font-size: 18px;
            font-weight: 600;
            color: #4a4a4a;
            line-height: 1.6;
            margin-top: 10px;
        }

        .modal-close-x {
            position: absolute;
            top: 15px;
            right: 20px;
            color: #999999;
            font-size: 28px;
            font-weight: 300;
            cursor: pointer;
            transition: color 0.2s;
            font-family: Arial, sans-serif;
            user-select: none;
        }

        .modal-close-x:hover {
            color: #333333;
        }

        /* ปรับแต่งการ์ดเมื่อแสดงผลบนหน้าจอมือถือ */
        @media (max-width: 868px) {
            .dropdown-container {
                grid-template-columns: 1fr; /* เรียงเป็นแถวเดี่ยวแนวตั้งค๊าา */
                gap: 20px;
                padding: 0 10px;
            }
            .main-btn {
                min-height: 130px;
                padding: 30px 20px;
            }
        }
    </style>
</head>
<body>

    <!-- 🐏 โลโก้ด้านบนสุด -->
    <div class="logo-container">
        <a href="index.html"><img src="Logo.jpg" alt="After You" class="logo-img"></a>
    </div>

    <!-- 📋 หัวข้อหลัก -->
    <h1 class="page-title">ผลการสอบ</h1>
    
    <!-- ➖ เส้นคั่นสไตล์มินิมอล -->
    <div class="divider"></div>

    <div class="dropdown-container">
        
        <!-- 📝 1. กล่องข้อเขียนและตารางสอบปฏิบัติ -->
        <div class="dropdown-wrapper">
            <div class="main-btn has-arrow" onclick="toggleDropdown(this)">
                <span>สอบข้อเขียน และตารางเข้าสอบปฏิบัติ</span>
                <span class="latest-badge">Latest: JUL-69</span>
            </div>
            <div class="dropdown-content">
                <a href="https://docs.google.com/spreadsheets/d/e/2PACX-1vQwAsb1enWglgninH1HCYqRFUimkngCGh27dKMNBOQBUGnvmdv6XWgtFBJxKEQlLjct-aIh4l4ZbbtL/pubhtml?gid=0&single=true" target="_blank">MAY-69</a>
                <a href="https://docs.google.com/spreadsheets/d/e/2PACX-1vR40_VcU-EMHFCovsB0dPrtv2eFDiqVNZawv6xX41Kou9lBDAoAF2hjdododrRWAnAhJx2hsF3AOivl/pubhtml?gid=2115498702&single=true" target="_blank">JUL-69</a>
                <a href="#">SEP-69</a>
            </div>
        </div>

        <!-- 🏋️ 2. กล่องสอบปฏิบัติ -->
        <div class="dropdown-wrapper">
            <div class="main-btn has-arrow" onclick="toggleDropdown(this)">
                <span>สอบปฏิบัติ</span>
                <span class="latest-badge">Latest: JUL-69</span>
            </div>
            <div class="dropdown-content">
                <a href="https://docs.google.com/spreadsheets/d/e/2PACX-1vQwAsb1enWglgninH1HCYqRFUimkngCGh27dKMNBOQBUGnvmdv6XWgtFBJxKEQlLjct-aIh4l4ZbbtL/pubhtml?gid=2114985660&single=true" target="_blank">MAY-69 (สอบMAY-JUN-69)</a>
                <a href="https://docs.google.com/spreadsheets/d/e/2PACX-1vR40_VcU-EMHFCovsB0dPrtv2eFDiqVNZawv6xX41Kou9lBDAoAF2hjdododrRWAnAhJx2hsF3AOivl/pubhtml?gid=947172196&single=true" target="_blank">JUL-69 (สอบJUL-AUG-69)</a>
                <a href="#">SEP-69 (สอบSEP-OCT-69)</a>
            </div>
        </div>

        <!-- 🍳 3. กล่องสรุปกุ๊ก (ขนาดเท่าเพื่อนเป๊ะๆ คลีนสุดๆ) -->
        <div class="dropdown-wrapper">
            <div class="main-btn" onclick="openNoticeModal()">
                <span>สรุปกุ๊ก</span>
                <span class="latest-badge" style="color:#777; background:#eee; border-color:#ddd;">Database ↗</span>
            </div>
        </div>

    </div>

    <!-- 🌟 โครงสร้างหน้าต่างแจ้งเตือนสรุปกุ๊ก -->
    <div id="noticeModal" class="notice-modal">
        <div class="notice-box">
            <span class="modal-close-x" onclick="closeNoticeAndRedirect()">&times;</span>
            <div class="notice-text">
                📍 โปรดกรอกข้อมูลพนักงานเพื่อตรวจสอบสรุปกุ๊กนะคะ
            </div>
        </div>
    </div>

    <!-- ⚡️ โค้ด JavaScript ระบบสัมผัสและคลิกข้ามลิงก์ -->
    <script>
        function toggleDropdown(button) {
            const currentWrapper = button.parentElement;
            document.querySelectorAll('.dropdown-wrapper').forEach(wrapper => {
                if (wrapper !== currentWrapper) {
                    wrapper.classList.remove('active');
                }
            });
            currentWrapper.classList.toggle('active');
        }

        window.onclick = function(event) {
            // ปรับเงื่อนไขให้คลิกปุ่มหรือป้ายด้านในแล้วไม่หลุดบั๊กค๊าา
            if (!event.target.closest('.main-btn')) {
                document.querySelectorAll('.dropdown-wrapper').forEach(wrapper => {
                    if(!wrapper.closest('.notice-box')) {
                        wrapper.classList.remove('active');
                    }
                });
            }
        }

        function openNoticeModal() {
            const modal = document.getElementById('noticeModal');
            modal.style.display = 'flex';
            setTimeout(() => {
                modal.classList.add('active');
            }, 10);
        }

        function closeNoticeAndRedirect() {
            const modal = document.getElementById('noticeModal');
            modal.classList.remove('active');
            setTimeout(() => {
                modal.style.display = 'none';
                window.open('https://training-qc-au.github.io/database/index.html', '_blank');
            }, 300);
        }
    </script>

</body>
</html>
