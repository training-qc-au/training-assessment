<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>After You - Exam Results</title>
    <!-- 🐏 ไอคอนบนแท็บดึง Logo.jpg ค๊าา -->
    <link rel="icon" type="image/jpeg" href="Logo.jpg">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;700&family=Anuphan:wght@500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #ffffff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 60px 20px;
            font-family: 'Anuphan', 'Plus Jakarta Sans', sans-serif;
        }

        /* 🐏 โลโก้แบรนด์ด้านบนสุด */
        .logo-container {
            margin-bottom: 20px;
            text-align: center;
        }

        .logo-img {
            width: 100px;
            height: auto;
        }

        /* 📋 หัวข้อผลการสอบ */
        .page-title {
            font-size: 32px;
            font-weight: 700;
            color: #4a4a4a;
            letter-spacing: 1px;
            margin-bottom: 30px;
            text-align: center;
        }

        /* ➖ เส้นคั่นแนวนอนยาวคลีนๆ */
        .divider {
            width: 100%;
            max-width: 900px;
            height: 1.5px;
            background-color: #707070;
            margin-bottom: 60px;
        }

        /* 🥞 แผงจัดวางปุ่มดรอปดาวน์ซ้าย-ขวา ปรับ gap ลดลงเล็กน้อยเพื่อรองรับปุ่มที่ยาวขึ้นค๊าา */
        .dropdown-container {
            display: flex;
            gap: 40px;
            justify-content: center;
            align-items: flex-start;
            width: 100%;
            max-width: 900px;
        }

        /* 🔳 ก้อนเมนูดรอปดาวน์ */
        .dropdown-wrapper {
            position: relative;
            display: inline-block;
        }

        /* 🔘 ปุ่มกดหลัก ปรับเอา min-width ออกเพื่อให้ยืดหดตามความยาวตัวอักษรได้กริ๊บๆ ค๊าา */
        .main-btn {
            background-color: #dbdbdb;
            color: #4a4a4a;
            padding: 14px 28px;
            font-size: 20px;
            font-weight: 700;
            border-radius: 12px;
            cursor: pointer;
            text-align: center;
            white-space: nowrap; /* บังคับไม่ให้ข้อความยาวๆ ดีดลงบรรทัดใหม่ในจอคอมค๊าา */
            transition: all 0.3s ease;
            user-select: none;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.02);
        }

        .dropdown-wrapper:hover .main-btn {
            background-color: #cdcdcd;
        }

        /* 📜 กล่องรายการเดือนที่จะดรอปดาวน์ลงมา */
        .dropdown-content {
            display: none;
            position: absolute;
            top: 100%;
            left: 0;
            background-color: #f7f7f7;
            min-width: 100%; /* ขนาดกว้างเท่ากับตัวปุ่มหลักเป๊ะๆ */
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.08);
            border-radius: 0 0 12px 12px;
            overflow: hidden;
            z-index: 100;
            opacity: 0;
            transform: translateY(-10px);
            transition: opacity 0.3s ease, transform 0.3s ease;
        }

        .dropdown-wrapper:hover .dropdown-content {
            display: block;
            opacity: 1;
            transform: translateY(0);
        }

        /* 📍 สไตล์ของแต่ละเดือนข้างในดรอปดาวน์ */
        .dropdown-content a {
            color: #555555;
            padding: 14px 20px;
            text-decoration: none;
            display: block;
            font-size: 16px;
            font-weight: 600;
            font-family: 'Plus Jakarta Sans', sans-serif;
            text-align: center;
            border-bottom: 1px solid #eeeeee;
            transition: background-color 0.2s;
        }

        .dropdown-content a:last-child {
            border-bottom: none;
        }

        .dropdown-content a:hover {
            background-color: #e8e8e8;
            color: #222222;
        }

        /* ปรับแต่งรองรับหน้าจอมือถือ ให้ปุ่มเรียงเดี่ยวแนวตั้งและยืดเต็มจอสวยๆ ค๊าา */
        @media (max-width: 768px) {
            .dropdown-container {
                flex-direction: column;
                align-items: center;
                gap: 40px;
            }
            .dropdown-wrapper {
                width: 100%;
                max-width: 340px;
            }
            .main-btn {
                white-space: normal; /* ในมือถือยอมให้ตัดคำได้เพื่อไม่ให้ปุ่มล้นหน้าจอค๊าา */
                font-size: 18px;
                padding: 14px 20px;
            }
        }
    </style>
</head>
<body>

    <!-- 🐏 โลโก้ด้านบนสุด -->
    <div class="logo-container">
        <a href="index.html"><img src="Logo.jpg" alt="After You" class="logo-img"></a>
    </div>

    <!-- 📋 หัวข้อหลัก -->
    <h1 class="page-title">ผลการสอบ</h1>
    
    <!-- ➖ เส้นคั่นสไตล์มินิมอล -->
    <div class="divider"></div>

    <!-- 🥞 โซนปุ่มดรอปดาวน์อัปเกรดชื่อใหม่แล้วค๊าา -->
    <div class="dropdown-container">
        
        <!-- 📝 1. ฝั่งสอบข้อเขียน และตารางเข้าสอบปฏิบัติ (เปลี่ยนชื่อปุ่มตามบรีฟคุณพี่แล้วจร้าา) -->
        <div class="dropdown-wrapper">
            <div class="main-btn">สอบข้อเขียน และตารางเข้าสอบปฏิบัติ</div>
            <div class="dropdown-content">
                <a href="#">MAR-69</a>
                <a href="#">MAY-69</a>
                <a href="#">JUL-69</a>
                <a href="#">SEP-69</a>
            </div>
        </div>

        <!-- 🏋️ 2. ฝั่งสอบปฏิบัติ -->
        <div class="dropdown-wrapper">
            <div class="main-btn">สอบปฏิบัติ</div>
            <div class="dropdown-content">
                <a href="#">MAR-69</a>
                <a href="#">MAY-69</a>
                <a href="#">JUL-69</a>
                <a href="#">SEP-69</a>
            </div>
        </div>

    </div>

</body>
</html>
