<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>After You - Training Categories</title>
    <link rel="icon" type="image/png" href="logo.png">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@700&family=Anuphan:wght@600;700&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #ffffff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px; /* เพิ่มระยะบนล่างนิดนึงเพราะมี 4 ช่องค๊าา */
        }

        /* 🐏 โลโก้แบรนด์ด้านบนสุด */
        .logo-container {
            margin-bottom: 40px;
            text-align: center;
        }

        .logo-img {
            width: 110px;
            height: auto;
        }

        /* 🥞 แผงจัดวางรูปสี่เหลี่ยมจัตุรัส 2x2 Grid */
        .portal-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr); /* แบ่งเป็น 2 คอลัมน์เป๊ะๆ */
            gap: 30px; /* ระยะห่างระหว่างรูป */
            max-width: 900px;
            width: 100%;
        }

        /* 🔳 สไตล์รูปสี่เหลี่ยมจัตุรัส (Square Tiles) */
        .thumb-card {
            aspect-ratio: 1 / 1; /* บังคับให้เป็นสี่เหลี่ยมจัตุรัสเสมอค๊าา */
            border-radius: 12px; /* มนปลายนิดๆ ให้ดูซอฟต์พรีเมียม */
            overflow: hidden;
            position: relative;
            text-decoration: none;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.05);
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .thumb-card:hover {
            transform: scale(1.03);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
        }

        .thumb-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: brightness(0.80);
            transition: transform 0.4s ease;
        }

        .thumb-card:hover .thumb-img {
            transform: scale(1.05);
        }

        /* ✍️ ตัวหนังสือภาษาไทยบนรูปสี่เหลี่ยม */
        .thumb-overlay-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #ffffff;
            font-family: 'Anuphan', sans-serif;
            font-size: 32px; /* ขนาดใหญ่กำลังดีสำหรับ 4 ช่องค๊าา */
            font-weight: 700;
            text-shadow: 0 2px 12px rgba(0, 0, 0, 0.6);
            text-align: center;
            width: 90%;
            line-height: 1.2;
        }

        /* สำหรับมือถือ ปรับให้เรียงเดี่ยวเพื่อความสะดวกในการดูค๊าา */
        @media (max-width: 600px) {
            .portal-grid {
                grid-template-columns: 1fr; /* แถวละ 1 รูปค๊าา */
                gap: 20px;
            }
            .thumb-overlay-text {
                font-size: 28px;
            }
        }
    </style>
</head>
<body>

    <div class="logo-container">
        <a href="index.html"><img src="Logo.jpg" alt="After You" class="logo-img"></a>
    </div>

    <div class="portal-grid">
        
        <a href="#" class="thumb-card">
            <img src="Beverage.jpg" alt="อบรม Beverage" class="thumb-img">
            <div class="thumb-overlay-text">อบรม<br>Beverage</div>
        </a>

        <a href="#" class="thumb-card">
            <img src="Dessert.jpg" alt="อบรม Dessert" class="thumb-img">
            <div class="thumb-overlay-text">อบรม<br>Dessert</div>
        </a>

        <a href="#" class="thumb-card">
            <img src="Kakigori.jpg" alt="อบรม Kakigori" class="thumb-img">
            <div class="thumb-overlay-text">อบรม<br>Kakigori</div>
        </a>

        <a href="#" class="thumb-card">
            <img src="MOU1.jpg" alt="อบรม MOU" class="thumb-img">
            <div class="thumb-overlay-text">อบรม<br>MOU</div>
        </a>

    </div>

</body>
</html>
