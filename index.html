<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>After You - Training & Assessment Portal</title>
    <link rel="icon" type="image/png" href="logo.png">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@700&family=Anuphan:wght@600;700&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #ffffff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        /* 🐏 โลโก้แบรนด์ด้านบนสุด ดึงจากไฟล์ Logo.jpg */
        .logo-container {
            margin-bottom: 50px;
            text-align: center;
        }

        .logo-img {
            width: 130px; /* ขนาดโลโก้แกะน้อยสุดลงตัว */
            height: auto;
        }

        /* 🥞 กล่องจัดวางรูปวงกลม 2 ฝั่ง ซ้าย-ขวา */
        .portal-grid {
            display: flex;
            gap: 60px;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
            max-width: 1000px;
            width: 100%;
        }

        /* 🔘 สไตล์รูปวงกลม (Thumbnails) คลีนๆ มินิมอล */
        .thumb-card {
            width: 320px;
            height: 320px;
            border-radius: 50%; /* บังคับรูปทรงกลมมนเป๊ะ */
            overflow: hidden;
            position: relative;
            text-decoration: none;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.06);
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        /* เอฟเฟกต์เวลาเมาส์ชี้ ขยายตัวนุ่มนวลพรีเมียม */
        .thumb-card:hover {
            transform: scale(1.04);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.12);
        }

        /* รูปภาพพื้นหลังข้างในวงกลม */
        .thumb-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: brightness(0.80); /* หรี่ไฟภาพลงอีกนิดเพื่อให้ตัวหนังสือภาษาไทยสีขาวเด่นเด้งขึ้นมาค๊าา */
            transition: transform 0.4s ease;
        }

        .thumb-card:hover .thumb-img {
            transform: scale(1.06);
        }

        /* ✍️ ปรับฟอนต์ภาษาไทย "อบรม" และ "สอบ" ให้ใหญ่ สวย สมส่วนค๊าา */
        .thumb-overlay-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #ffffff;
            font-family: 'Anuphan', 'Plus Jakarta Sans', sans-serif;
            font-size: 52px; /* 🌟 ขยายขนาดจาก 24px เป็น 42px ให้ใหญ่เต็มตาตามบรีฟเป๊ะๆ ค๊าา */
            font-weight: 700;
            letter-spacing: 1px;
            text-shadow: 0 2px 15px rgba(0, 0, 0, 0.6); /* เพิ่มมิติเงาหลังตัวอักษรให้คมกริบ */
            text-align: center;
            width: 90%;
            white-space: nowrap;
        }

        /* รองรับการย่อขนาดบนหน้าจอมือถือให้อัตโนมัติ */
        @media (max-width: 768px) {
            .portal-grid {
                gap: 40px;
                flex-direction: column;
            }
            .thumb-card {
                width: 260px;
                height: 260px;
            }
            .thumb-overlay-text {
                font-size: 40px; /* ขนาดบนมือถือใหญ่กำลังดีอ่านง่ายสุดๆ ค๊าา */
            }
        }
    </style>
</head>
<body>

    <div class="logo-container">
        <img src="Logo.jpg" alt="After You" class="logo-img">
    </div>

    <div class="portal-grid">
        
        <a href="training.html" target="_blank" class="thumb-card">
            <img src="Training.jpg" alt="การอบรม" class="thumb-img">
            <div class="thumb-overlay-text">อบรม</div>
        </a>

        <a href="#" target="_blank" class="thumb-card">
            <img src="Assessment.jpg" alt="การสอบ" class="thumb-img">
            <div class="thumb-overlay-text">สอบ</div>
        </a>

    </div>

</body>
</html>
